              url = f"{os.environ['API_BASE'].rstrip('/')}/bot{bot_token}/sendMessage"
              req = urllib.request.Request(url, data=payload, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      resp.read()
              except urllib.error.URLError as exc:
                  print(f"telegram alert failed: {exc}")
                  raise SystemExit(1)

          main()
          PY
  e2e:
    runs-on: ubuntu-latest
    needs: [rust, js]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Alert Telegram on main failure
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_RED_CHAT_ID }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          JOB: ${{ github.job }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
