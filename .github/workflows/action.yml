name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rust
      - run: cargo build
      - run: cargo check
      - run: cargo test

      # wasm
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build
      - name: Alert Telegram on main failure
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_RED_CHAT_ID }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          JOB: ${{ github.job }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_BASE: https://api.telegram.org
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          def build_message(repo, workflow, job, ref, sha, run_url):
              return "\n".join([
                  "CI failed on main",
                  f"repo: {repo}",
                  f"workflow: {workflow}",
                  f"job: {job}",
                  f"ref: {ref}",
                  f"sha: {sha}",
                  f"run: {run_url}",
              ])

          def main():
              bot_token = os.environ["BOT_TOKEN"]
              chat_id = os.environ["CHAT_ID"]
              message = build_message(
                  os.environ["REPO"],
                  os.environ["WORKFLOW"],
                  os.environ["JOB"],
                  os.environ["REF"],
                  os.environ["SHA"],
                  os.environ["RUN_URL"],
              )
              payload = urllib.parse.urlencode(
                  {
                      "chat_id": chat_id,
                      "text": message,
                      "disable_web_page_preview": "true",
                  }
              ).encode("utf-8")
              url = f"{os.environ['API_BASE'].rstrip('/')}/bot{bot_token}/sendMessage"
              req = urllib.request.Request(url, data=payload, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      resp.read()
              except urllib.error.URLError as exc:
                  print(f"telegram alert failed: {exc}")
                  raise SystemExit(1)

          main()
          PY
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # wasm
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build

      # js
      - run: npm ci
      - run: npm run build

      - name: Alert Telegram on main failure
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_RED_CHAT_ID }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          JOB: ${{ github.job }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_BASE: https://api.telegram.org
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          def build_message(repo, workflow, job, ref, sha, run_url):
