repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - httpx>=0.28.0
          - mcp>=1.14.0
          - pydantic>=2.0
          - types-cachetools>=5.3.0

  - repo: local
    hooks:
      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://forgejo.coilysiren.me/coilyco-flight-deck/agentic-os
    rev: v0.166.0
    hooks:
      - id: catalog-doc-size
      - id: catalog-trifecta
      - id: documentation-layout
      - id: context-load-points
      - id: code-comments
      - id: catalog-block-present
      - id: check-skills
      - id: dead-cross-links
      - id: repo-pointer-skills
      - id: misplaced-skills
      - id: agent-compose-size
      - id: agent-compose-dedup
      - id: trufflehog
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        args: [--assume-in-merge]
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py
