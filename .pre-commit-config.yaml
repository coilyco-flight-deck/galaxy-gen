repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true

  # BEGIN managed by agentic-os-kai/scripts/apply-skill-discipline-hooks.py
  - repo: local
    hooks:
      - id: validate-skills
        name: skill conventions
        description: Validate the structure of .claude/skills/ against .claude/skills/categories.yaml.
        entry: python scripts/validate-skills.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: check-dead-links
        name: dead cross-links
        description: Validate that inline markdown links inside .claude/skills/ resolve to real files.
        entry: python scripts/check-dead-links.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
  # END managed by agentic-os-kai/scripts/apply-skill-discipline-hooks.py

  # BEGIN managed by agentic-os-kai/scripts/apply-commit-msg-hook.py
  - repo: local
    hooks:
      - id: closes-issue
        name: commit closes a GitHub issue
        description: Reject commit messages without a GitHub closing keyword (closes/fixes/resolves #N).
        entry: python3 scripts/check-commit-closes-issue.py
        language: system
        stages: [commit-msg]
  # END managed by agentic-os-kai/scripts/apply-commit-msg-hook.py

  # BEGIN managed by agentic-os-kai/scripts/apply-catalog-block-hook.py
  - repo: local
    hooks:
      - id: catalog-block-present
        name: .coily/coily.yaml catalog block present
        description: Assert this repo declares its catalog metadata. See coilysiren/agentic-os-kai#420.
        entry: python scripts/check-catalog-block.py
        language: python
        additional_dependencies: [pyyaml]
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
  # END managed by agentic-os-kai/scripts/apply-catalog-block-hook.py
