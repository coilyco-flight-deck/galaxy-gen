repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: leak-check
        name: leak-check (private-string denylist)
        description: Reject staged files that introduce known-private strings (LAN IPs, MACs, SSIDs, addresses, secondary email). Vendored from coilyco-ai/scripts/.
        entry: python3 scripts/leak-check.py
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: skill-conventions
        name: skill conventions (validate_skills.py)
        description: Validate .claude/skills/ structure against .claude/skills/categories.yaml. Vendored from coilyco-ai/scripts/.
        entry: python3 scripts/validate_skills.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: dead-cross-links
        name: dead cross-links (check_dead_links.py)
        description: Validate inline markdown links inside .claude/skills/ resolve to real files. Vendored from coilyco-ai/scripts/.
        entry: python3 scripts/check_dead_links.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true
  
  # BEGIN managed by coilyco-ai/scripts/apply-commit-msg-hook.py
  - repo: local
    hooks:
      - id: closes-issue
        name: commit closes a GitHub issue
        description: Reject commit messages without a GitHub closing keyword (closes/fixes/resolves #N).
        entry: python3 scripts/check-commit-closes-issue.py
        language: system
        stages: [commit-msg]
  # END managed by coilyco-ai/scripts/apply-commit-msg-hook.py
