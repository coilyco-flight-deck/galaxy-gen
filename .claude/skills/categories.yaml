# Skill-category spec for galaxy-gen/.claude/skills/.
#
# Source of truth for scripts/validate_skills.py. The human-readable
# discipline is in
# .claude/skills/tooling-skill-authoring/references/handbook.md.
# Keep this file and the handbook in sync.
#
# Each category entry is either a prefix family or an exact-name skill.
# Field reference:
#   kind:            "prefix" or "exact"
#   prefix / exact:  the matching name fragment
#   enforce_status:  if true, the SKILL.md must carry a status line
#                    matching status_kinds + status_freshness.

categories:

  # Design and reference skills scoped to this repo's procedural galaxy sim.
  - id: coding-galaxy-gen
    kind: prefix
    prefix: coding-galaxy-gen-
    enforce_status: false

  # Agent-ecosystem meta. Currently just tooling-skill-authoring, which
  # documents the rules and points at this spec.
  - id: tooling
    kind: prefix
    prefix: tooling-
    enforce_status: false

# ---- Global checks ----

# Strings that must not appear in any SKILL.md body. Populate when a
# deprecated skill name needs to stay out of cross-links.
forbidden_body_strings: []

# Hard caps on SKILL.md size. Past these the harness loader degrades.
max_skill_md_lines: 500
max_skill_md_bytes: 10000
