name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: docker
    # Rust unit tests only. No `container:` override - the checkout JS action
    # needs node in the job container, which the default runner image ships
    # but rust:* images don't; rust is installed via rustup below. The browser
    # e2e + tsc typecheck run on GitHub PR CI (.github/workflows/action.yml).
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo test
      - name: Alert Telegram on main failure
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: coilysiren/agentic-os/actions/telegram-alert@main
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_RED_CHAT_ID }}
