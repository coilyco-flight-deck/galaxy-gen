name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: docker
    # Rust unit tests only. No `container:` override - the checkout JS action
    # needs node in the job container, which the default runner image ships
    # but rust:* images don't; rust is installed via rustup below. The browser
    # e2e + tsc typecheck run on GitHub PR CI (.github/workflows/action.yml).
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo test
      - name: Alert Telegram on main failure
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_RED_CHAT_ID }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          JOB: ${{ github.job }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_BASE: https://api.telegram.org
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          def build_message(repo, workflow, job, ref, sha, run_url):
              return "\n".join([
                  "CI failed on main",
                  f"repo: {repo}",
                  f"workflow: {workflow}",
                  f"job: {job}",
                  f"ref: {ref}",
                  f"sha: {sha}",
                  f"run: {run_url}",
              ])

          def main():
              bot_token = os.environ["BOT_TOKEN"]
              chat_id = os.environ["CHAT_ID"]
              message = build_message(
                  os.environ["REPO"],
                  os.environ["WORKFLOW"],
                  os.environ["JOB"],
                  os.environ["REF"],
                  os.environ["SHA"],
                  os.environ["RUN_URL"],
              )
              payload = urllib.parse.urlencode(
                  {
                      "chat_id": chat_id,
                      "text": message,
                      "disable_web_page_preview": "true",
                  }
              ).encode("utf-8")
              url = f"{os.environ['API_BASE'].rstrip('/')}/bot{bot_token}/sendMessage"
              req = urllib.request.Request(url, data=payload, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      resp.read()
              except urllib.error.URLError as exc:
                  print(f"telegram alert failed: {exc}")
                  raise SystemExit(1)

          main()
          PY
