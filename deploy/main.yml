apiVersion: v1
kind: Namespace
metadata:
  name: ${NAME}
---
# Deployer ServiceAccount for the Forgejo Actions release pipeline. The CI
# deploy job authenticates as this SA to roll the app Deployment over the
# LAN (kubeconfig in the Forgejo Actions secret DEPLOY_KUBECONFIG on
# coilysiren/galaxy-gen, built from this SA's token Secret below). No tailnet
# join, no SSH. See coilysiren/galaxy-gen#17, coilysiren/backend#25.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: ${NAME}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: ${NAME}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: ${NAME}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployer
subjects:
  - kind: ServiceAccount
    name: deployer
    namespace: ${NAME}
---
# Long-lived token for the deployer SA. Kubernetes populates token, ca.crt,
# and namespace into this Secret; the DEPLOY_KUBECONFIG Forgejo secret is
# built from its ca.crt + token. Regenerate the kubeconfig if rotated. The
# token never lives in git. See coilysiren/galaxy-gen#17.
apiVersion: v1
kind: Secret
metadata:
  name: deployer-token
  namespace: ${NAME}
  annotations:
    kubernetes.io/service-account.name: deployer
type: kubernetes.io/service-account-token
---
# No pull-secret. The image is built by Forgejo Actions and pushed to the
# in-cluster registry (192.168.0.194:30500, plain http). The app pod is
# pinned to kai-server, whose containerd has the insecure-registry entry in
# registries.yaml, so the pull lands there. See coilysiren/infrastructure#171.

---
# Tailnet device for this service. Auth key minted by
# terraform/tailscale-devices/ in coilysiren/infrastructure under the
# short name `galaxy-gen`; lands in SSM at /coilysiren/galaxy-gen/
# ts-authkey and the ExternalSecret below materializes it into the
# namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${NAME}-ts
  namespace: ${NAME}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${NAME}-ts-state
  namespace: ${NAME}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${NAME}-ts-state
  namespace: ${NAME}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${NAME}-ts-state
subjects:
  - kind: ServiceAccount
    name: ${NAME}-ts
    namespace: ${NAME}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-authkey
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/galaxy-gen/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${NAME}-app
  namespace: ${NAME}
  labels:
    app: ${NAME}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${NAME}-app
  template:
    metadata:
      labels:
        app: ${NAME}-app
    spec:
      serviceAccountName: ${NAME}-ts
      # /dev/net/tun for the ts sidecar lives on kai-server (native
      # Linux 6.8); WSL2 nodes don't expose it.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ${NAME}
          image: ${IMAGE}
          # Pulled from the in-cluster registry (192.168.0.194:30500) by
          # kai-server's containerd over plain http. Always, so each rolled
          # ${git-hash} tag is fetched fresh. See coilysiren/infrastructure#171.
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          env:
            # Bind 80 so tailnet peers can hit `http://galaxy-gen`
            # without a port suffix. Caddy reads $PORT; the official
            # caddy image runs as root, so no NET_BIND_SERVICE needed.
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
        # tailscale sidecar in kernel mode. Same shape as the canary
        # at coilysiren/infrastructure#201 and the eco-* migrations.
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: galaxy-gen
            - name: TS_KUBE_SECRET
              value: ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ${NAME}-service
  namespace: ${NAME}
spec:
  type: ClusterIP
  selector:
    app: ${NAME}-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${NAME}-ingress
  namespace: ${NAME}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${DNS_NAME}
      secretName: ${NAME}-tls
  rules:
    - host: ${DNS_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${NAME}-service
                port:
                  number: 80
