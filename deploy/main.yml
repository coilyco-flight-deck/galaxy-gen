apiVersion: v1
kind: Namespace
metadata:
  name: ${NAME}

---
# GHCR pull-secret, synced declaratively from AWS SSM via the cluster's
# external-secrets operator. `/github/pat` is the shared PAT for ghcr.io/coilysiren
# and lives in AWS SSM Parameter Store. ESO renders it into a
# kubernetes.io/dockerconfigjson secret — no manual kubectl create, no PAT
# materializing outside the cluster. Same pattern as eco-mcp-app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-registry
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: docker-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "coilysiren:%s" .pat | b64enc }}"}}}
  data:
    - secretKey: pat
      remoteRef:
        key: /github/pat

---
# Tailnet device for this service. Auth key minted by
# terraform/tailscale-devices/ in coilysiren/infrastructure under the
# short name `galaxy-gen`; lands in SSM at /coilysiren/galaxy-gen/
# ts-authkey and the ExternalSecret below materializes it into the
# namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${NAME}-ts
  namespace: ${NAME}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${NAME}-ts-state
  namespace: ${NAME}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${NAME}-ts-state
  namespace: ${NAME}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${NAME}-ts-state
subjects:
  - kind: ServiceAccount
    name: ${NAME}-ts
    namespace: ${NAME}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-authkey
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/galaxy-gen/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${NAME}-app
  namespace: ${NAME}
  labels:
    app: ${NAME}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${NAME}-app
  template:
    metadata:
      labels:
        app: ${NAME}-app
    spec:
      serviceAccountName: ${NAME}-ts
      # /dev/net/tun for the ts sidecar lives on kai-server (native
      # Linux 6.8); WSL2 nodes don't expose it.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      imagePullSecrets:
        - name: docker-registry
      containers:
        - name: ${NAME}
          image: ${IMAGE}
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          env:
            # Bind 80 so tailnet peers can hit `http://galaxy-gen`
            # without a port suffix. Caddy reads $PORT; the official
            # caddy image runs as root, so no NET_BIND_SERVICE needed.
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
        # tailscale sidecar in kernel mode. Same shape as the canary
        # at coilysiren/infrastructure#201 and the eco-* migrations.
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: galaxy-gen
            - name: TS_KUBE_SECRET
              value: ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ${NAME}-service
  namespace: ${NAME}
spec:
  type: ClusterIP
  selector:
    app: ${NAME}-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${NAME}-ingress
  namespace: ${NAME}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${DNS_NAME}
      secretName: ${NAME}-tls
  rules:
    - host: ${DNS_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${NAME}-service
                port:
                  number: 80
